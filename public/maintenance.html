<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>En Mantenimiento – SurAmerend</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #001428 0%, #002a5c 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #f0f4ff;
            padding: 2rem;
        }

        .card {
            max-width: 560px;
            width: 100%;
            text-align: center;
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            background: rgba(255, 119, 0, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon svg {
            width: 40px;
            height: 40px;
            fill: none;
            stroke: #ff7700;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .brand {
            font-size: 0.85rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #ff7700;
            font-weight: 600;
            margin-bottom: 1.25rem;
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1.25rem;
        }

        p {
            font-size: 1.05rem;
            color: rgba(240, 244, 255, 0.75);
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        .divider {
            width: 48px;
            height: 3px;
            background: #ff7700;
            border-radius: 2px;
            margin: 0 auto 2.5rem;
        }

        .contact {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 119, 0, 0.12);
            border: 1px solid rgba(255, 119, 0, 0.35);
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            color: #ff9933;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.2s, border-color 0.2s;
        }

        .contact:hover {
            background: rgba(255, 119, 0, 0.22);
            border-color: rgba(255, 119, 0, 0.6);
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: rgba(240, 244, 255, 0.35);
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon">
            <svg viewBox="0 0 24 24">
                <path d="M12 2L2 7l10 5 10-5-10-5z" />
                <path d="M2 17l10 5 10-5" />
                <path d="M2 12l10 5 10-5" />
            </svg>
        </div>

        <div class="brand">SurAmerend – Ensayos No Destructivos</div>

        <h1>Sitio en Mantenimiento</h1>

        <div class="divider"></div>

        <p>
            Estamos realizando mejoras para ofrecerle una mejor experiencia.<br />
            Regresaremos en breve. Disculpe las molestias.
        </p>

        <a href="mailto:info@suramerend.com" class="contact">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" viewBox="0 0 24 24">
                <rect x="2" y="4" width="20" height="16" rx="2" />
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
            </svg>
            operaciones@suramerend.com
        </a>

        <div class="footer">&copy; 2026 SurAmerend. Todos los derechos reservados.</div>
    </div>
</body>

</html>
